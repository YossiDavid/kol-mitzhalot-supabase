<!--
  ספק: Supabase Auth (לא SendGrid)
  מיקום ב-Dashboard: Authentication → Email Templates → Reauthentication / Confirm reauthentication
  נושא מוצע: אימות זהות נוסף
  משתנים: {{ .Token }}
-->
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#ecf0f2;">
  <tr>
    <td style="padding:40px 20px;">
      <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:480px;margin:0 auto;background:#ffffff;border-radius:10px;border:1px solid #e5e7eb;box-shadow:0 2px 12px rgba(0,0,0,0.06);">

        <!-- לוגו -->
        <tr>
          <td style="padding:32px 32px 20px;text-align:center;">
            <img src="https://hnsugnkkujaochdwfyzb.supabase.co/storage/v1/object/public/logo/logo-kol-mitzhalot.png"
                 alt="קול מצהלות"
                 width="220"
                 height="120"
                 style="display:block;margin:0 auto;max-width:220px;height:auto;" />
          </td>
        </tr>

        <!-- כותרת -->
        <tr>
          <td style="padding:0 32px 8px;text-align:center;">
            <h1 style="margin:0;font-size:22px;font-weight:700;color:#254c49;">
              אימות זהות נוסף
            </h1>
          </td>
        </tr>

        <!-- תוכן -->
        <tr>
          <td style="padding:8px 32px 28px;text-align:center;">
            <p style="margin:0 0 18px;color:#4b5563;font-size:15px;line-height:1.7;">
              לצורך אבטחה, נדרש אימות נוסף לחשבון שלך.
              הזן את הקוד הבא במסך האימות:
            </p>

            <!-- קוד -->
            <div style="margin:0 0 20px;padding:16px;background:#f8fafc;border:1px dashed #3899a3;border-radius:12px;font-size:28px;font-weight:700;letter-spacing:4px;color:#254c49;">
              {{ .Token }}
            </div>

            <p style="margin:0 0 8px;font-size:14px;color:#6b7280;line-height:1.7;">
              הקוד חד־פעמי ותקף לזמן מוגבל.
            </p>

            <p style="margin:0;font-size:14px;color:#6b7280;line-height:1.7;">
              אם לא אתה ביקשת לבצע פעולה זו, מומלץ להחליף סיסמה בהקדם.
            </p>
          </td>
        </tr>

        <!-- פוטר -->
        <tr>
          <td style="padding:16px 32px 24px;border-top:1px solid #e5e7eb;text-align:center;font-size:12px;color:#6b7280;">
            קול מצהלות – המערכת לניהול שידוכים
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
